name: DoubleCopyPaste
options:
  bundleIdPrefix: com.keaganr
  deploymentTarget:
    macOS: "13.0"
packages:
  DCPModel:
    path: Packages/DCPModel
  DCPClipboard:
    path: Packages/DCPClipboard
  DCPUI:
    path: Packages/DCPUI
targets:
  DoubleCopyPaste:
    type: application
    platform: macOS
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Double Copy Paste
        CFBundleShortVersionString: "0.1.0"
        LSUIElement: true
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keaganr.DoubleCopyPaste
        PRODUCT_NAME: Double Copy Paste
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GK5YMCRFZN
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: false
    dependencies:
      - package: DCPModel
      - package: DCPClipboard
      - package: DCPUI
